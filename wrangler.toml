name = "llms-txt"
main = "worker.js"
compatibility_date = "2024-11-01"

[assets]
directory = "./public"
binding = "ASSETS"

# Per-IP rate limit on /api/generate: 5 requests per 60 seconds.
# Generous for real use; blocks scrapers hammering the crawl endpoint.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
