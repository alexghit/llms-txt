<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Draft an llms.txt file for any website." />

  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface-2: #1c1c1f;
  --line: rgba(255,255,255,.08);
  --line-strong: rgba(255,255,255,.14);
  --text: #e8e8ea;
  --muted: rgba(255,255,255,.5);
  --faint: rgba(255,255,255,.3);
  --ghost: #202024;
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Geist Mono", ui-monospace, monospace;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* Topbar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.75rem clamp(1.5rem, 4vw, 3rem);
}
.wordmark, .label-r {
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
}
.wordmark:hover { color: rgba(255,255,255,.85); }

/* Stage */
.stage {
  flex: 1;
  width: 100%;
  max-width: 620px;
  margin: 0 auto;
  padding: 2rem clamp(1.5rem, 4vw, 3rem);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.display {
  font-family: "Instrument Serif", Georgia, serif;
  font-weight: 400;
  font-style: italic;
  font-size: clamp(3.5rem, 11vw, 6rem);
  line-height: 1;
  color: var(--ghost);
  letter-spacing: -0.01em;
  margin-bottom: 3.5rem;
  user-select: none;
  transition: color 0.3s;
}
.display.on { color: var(--faint); }
.display em { font-style: italic; }

/* Field */
.field {
  width: 100%;
  max-width: 420px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  border-bottom: 1px solid var(--line);
  padding: 0.75rem 0.25rem;
  transition: border-color 0.2s;
}
.field:focus-within { border-color: var(--muted); }
.prefix { color: var(--faint); font-size: 1rem; }
#url {
  flex: 1;
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--text);
  font-family: inherit;
  font-size: 1.15rem;
  letter-spacing: 0.02em;
}
#url::placeholder { color: var(--faint); }

/* Buttons */
.btn-row {
  display: flex;
  gap: 0.6rem;
  justify-content: center;
  margin-top: 2rem;
}
.btn {
  background: var(--surface-2);
  border: 0;
  border-radius: 999px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  letter-spacing: 0.02em;
  padding: 0.7rem 1.6rem;
  cursor: pointer;
  transition: background 0.15s, transform 0.05s;
}
.btn:hover { background: #26262a; }
.btn:active { transform: scale(0.94); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-primary { background: rgba(255,255,255,.94); color: var(--bg); }
.btn-primary:hover { background: #fff; }

.status {
  min-height: 1.4rem;
  margin-top: 1.5rem;
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  color: var(--muted);
}
.status.error { color: #d98a8a; }

/* Result */
.result {
  width: 100%;
  margin-top: 2.5rem;
  animation: rise 0.35s ease;
}
@keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.output-wrap {
  position: relative;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  text-align: left;
  overflow: hidden;
}
.meta {
  display: block;
  padding: 0.85rem 1.1rem;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
}
.output {
  font-family: inherit;
  font-size: 0.8rem;
  line-height: 1.65;
  color: var(--text);
  padding: 1.1rem;
  max-height: 46vh;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Hint */
.hint {
  margin-top: 2.5rem;
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  color: var(--faint);
}
kbd {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 0.15rem 0.45rem;
  font-family: inherit;
  font-size: 0.7rem;
  color: var(--muted);
}

/* Footer */
.foot {
  padding: 2rem clamp(1.5rem, 4vw, 3rem);
  text-align: center;
  font-size: 0.72rem;
  letter-spacing: 0.03em;
  color: var(--faint);
}
.foot a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--line-strong); transition: color .2s, border-color .2s; }
.foot a:hover { color: rgba(255,255,255,.85); border-bottom-color: rgba(255,255,255,.4); }
.heart { color: #6a6a70; }

@media (max-width: 560px) {
  .topbar { padding: 1.25rem 1.25rem; }
  .wordmark, .label-r { font-size: 0.7rem; letter-spacing: 0.16em; }
  .stage { padding-top: 2.5rem; }
  .display { margin-bottom: 2.5rem; }
  .foot { font-size: 0.66rem; line-height: 1.9; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

</style>
</head>
<body>
  <header class="topbar">
    <a href="#" class="wordmark" id="wordmark" role="button">LLMS.TXT</a>
    <span class="label-r">FOR LLMS</span>
  </header>

  <main class="stage">
    <h1 class="display" id="display"><em>llms.txt</em></h1>

    <div class="field">
      <span class="prefix">↳</span>
      <input id="url" type="url" inputmode="url" autocomplete="off" spellcheck="false"
             placeholder="example.com" aria-label="Website URL" />
    </div>

    <div class="btn-row">
      <button class="btn" id="go">Generate</button>
    </div>

    <p class="status" id="status" role="status"></p>

    <section class="result" id="result" hidden>
      <div class="output-wrap">
        <span class="meta" id="resultMeta">LLMS.TXT</span>
        <pre id="output" class="output" tabindex="0"></pre>
      </div>
      <div class="btn-row">
        <button class="btn" id="copy">Copy</button>
        <button class="btn btn-primary" id="download">Download</button>
      </div>
    </section>

    <p class="hint">
      <kbd>Esc</kbd> clear
    </p>
  </main>

  <footer class="foot">
    Made with <span class="heart">♥</span> by Alex Ghit · <a href="mailto:alex@hey5.studio">alex@hey5.studio</a> · llms.txt generator · v1.0
  </footer>

  <script>
const $ = (id) => document.getElementById(id);
const urlInput = $("url");
const go = $("go");
const status = $("status");
const result = $("result");
const output = $("output");
const resultMeta = $("resultMeta");
const display = $("display");
let current = "";

function setStatus(msg, isError = false) {
  status.textContent = msg;
  status.classList.toggle("error", isError);
}

urlInput.addEventListener("input", () => {
  display.classList.toggle("on", urlInput.value.trim().length > 0);
});

function isValidUrl(value) {
  let v = value.trim();
  if (!v) return false;
  if (!/^https?:\/\//i.test(v)) v = "https://" + v;
  let u;
  try {
    u = new URL(v);
  } catch {
    return false;
  }
  const host = u.hostname;
  // must have a dot and a valid TLD-like ending, no spaces
  if (/\s/.test(host)) return false;
  if (!/^[a-z0-9.-]+\.[a-z]{2,}$/i.test(host)) return false;
  return true;
}

async function generate() {
  const value = urlInput.value.trim();
  if (!value) { setStatus("Enter a website URL.", true); urlInput.focus(); return; }
  if (!isValidUrl(value)) {
    setStatus("That doesn't look like a valid website URL.", true);
    urlInput.focus();
    return;
  }

  go.disabled = true;
  setStatus("Crawling site…");
  result.hidden = true;

  try {
    await new Promise(r => setTimeout(r, 700)); // demo only — no crawl in standalone preview
    const host = value.replace(/^https?:\/\//,"").replace(/\/.*$/,"");
    const name = host.split(".")[0].replace(/^./,c=>c.toUpperCase());
    const data = {
      pages: 6,
      llmstxt: `# ${name}\n\n> Example summary pulled from the site's meta description.\n\n## Main\n\n- [Home](https://${host}/): Landing page.\n- [About](https://${host}/about): Who we are and what we do.\n\n## Docs\n\n- [Getting Started](https://${host}/docs/start): Setup and first steps.\n- [API](https://${host}/docs/api): API reference.\n\n## Optional\n\n- [Privacy](https://${host}/privacy): Privacy policy.\n- [Terms](https://${host}/terms): Terms of service.`
    };

    current = data.llmstxt;
    output.textContent = current;
    resultMeta.textContent = `LLMS.TXT · ${data.pages} PAGES`;
    result.hidden = false;
    setStatus("Done. Review the descriptions before publishing.");
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    go.disabled = false;
  }
}

$("copy").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(current);
    $("copy").textContent = "Copied";
    setTimeout(() => ($("copy").textContent = "Copy"), 1400);
  } catch { setStatus("Couldn't copy.", true); }
});

$("download").addEventListener("click", () => {
  const blob = new Blob([current], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "llms.txt";
  a.click();
  URL.revokeObjectURL(a.href);
});

function reset() {
  urlInput.value = "";
  result.hidden = true;
  current = "";
  setStatus("");
  display.classList.remove("on");
  urlInput.focus();
}

go.addEventListener("click", generate);
urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") generate(); });
$("wordmark").addEventListener("click", (e) => { e.preventDefault(); reset(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") reset(); });
urlInput.focus();

</script>
</body>
</html>
